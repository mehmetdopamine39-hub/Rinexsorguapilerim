<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rinex API Gateway</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }
        .header p {
            color: #aaa;
            margin-top: 10px;
            font-size: 1.1rem;
        }
        .header .badge-group {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .header .badge-group span {
            background: rgba(255,255,255,0.1);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-title .icon {
            font-size: 1.5rem;
        }
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            background: #4CAF50;
            color: #fff;
        }
        .badge.blue { background: #2196F3; }
        .badge.orange { background: #FF9800; }
        .badge.red { background: #f44336; }
        .badge.purple { background: #9C27B0; }
        .badge.teal { background: #009688; }
        
        .endpoint {
            background: rgba(0,0,0,0.3);
            padding: 10px 14px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            margin: 10px 0;
            word-break: break-all;
            color: #ffd700;
            border-left: 3px solid #ffd700;
        }
        .param-group {
            margin: 10px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .param {
            background: rgba(33, 150, 243, 0.2);
            color: #64b5f6;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-family: 'Courier New', monospace;
            border: 1px solid rgba(33, 150, 243, 0.3);
        }
        .input-group {
            margin: 12px 0;
        }
        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #aaa;
            margin-bottom: 4px;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            transition: border-color 0.3s;
        }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #ffd700;
        }
        .input-group select option {
            background: #1a1a2e;
            color: #fff;
        }
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #1a1a2e;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            margin-top: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(255, 210, 0, 0.3);
        }
        .btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.4);
            border-radius: 8px;
            border-left: 4px solid #ffd700;
            max-height: 400px;
            overflow: auto;
            display: none;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-break: break-all;
            color: #e0e0e0;
        }
        .result.show {
            display: block;
        }
        .result .raw {
            color: #ffd700;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 15px;
            color: #ffd700;
            font-weight: bold;
        }
        .loading.show {
            display: block;
        }
        .loading .spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: #ff6b6b;
            background: rgba(244, 67, 54, 0.1);
            padding: 12px;
            border-radius: 5px;
            border-left: 4px solid #f44336;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.7rem;
            color: #aaa;
        }
        .status-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot.green { background: #4CAF50; }
        .dot.red { background: #f44336; }
        .dot.yellow { background: #FF9800; }
        .footer {
            text-align: center;
            padding: 30px 0;
            margin-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.1);
            color: #666;
            font-size: 0.9rem;
        }
        .footer a {
            color: #ffd700;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            color: #fff;
            padding: 15px 25px;
            border-radius: 10px;
            border-left: 4px solid #ffd700;
            display: none;
            z-index: 1000;
            max-width: 400px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast.show { display: block; }
        .toast.error { border-left-color: #f44336; }
        .toast.success { border-left-color: #4CAF50; }
        
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .input-row { grid-template-columns: 1fr; }
            .header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Rinex API Gateway</h1>
            <p>📡 Tüm API'ler tek noktada • Her endpoint kendi kaynağından veri çeker</p>
            <div class="badge-group">
                <span>🏦 IBAN</span>
                <span>🚗 Plaka</span>
                <span>💰 Papara</span>
                <span>🗳️ Seçmen</span>
                <span>📱 TurkTelekom</span>
                <span>⚡ Toplam 5 API</span>
            </div>
        </div>
        
        <div class="grid" id="apiGrid">
            <!-- API Kartları JavaScript ile oluşturulacak -->
        </div>
        
        <div class="footer">
            <p>🔗 Tüm API'ler orijinal kaynaklarından veri çeker • <a href="#" onclick="window.location.reload()">🔄 Yenile</a></p>
            <p style="margin-top:5px;font-size:0.8rem;">📱 Telegram: <a href="https://t.me/rinexdestek" target="_blank">@rinexdestek</a></p>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        // API Konfigürasyonu
        const APIS = [
            {
                id: 'iban',
                icon: '🏦',
                title: 'IBAN Sorgulama',
                badge: 'GET',
                badgeClass: 'teal',
                endpoint: '/api/iban',
                description: 'IBAN numarası ile sorgulama',
                params: [
                    { name: 'iban', label: 'IBAN Numarası', placeholder: 'TR280006256953335759003718', default: 'TR280006256953335759003718' }
                ],
                buildUrl: (vals) => `/api/iban?iban=${encodeURIComponent(vals.iban)}`
            },
            {
                id: 'plaka',
                icon: '🚗',
                title: 'Plaka Sorgulama',
                badge: 'GET',
                badgeClass: 'blue',
                endpoint: '/api/plaka',
                description: 'Plaka veya isim ile sorgulama',
                params: [
                    { name: 'q', label: 'Plaka veya İsim', placeholder: '34KG4978 veya ali', default: '34KG4978' }
                ],
                buildUrl: (vals) => `/api/plaka?q=${encodeURIComponent(vals.q)}`
            },
            {
                id: 'papara',
                icon: '💰',
                title: 'Papara Sorgulama',
                badge: 'GET',
                badgeClass: 'orange',
                endpoint: '/api/papara',
                description: 'ID veya isim ile sorgulama',
                params: [
                    { name: 'id', label: 'ID', placeholder: '1354693996', default: '1354693996' },
                    { name: 'name', label: 'İsim', placeholder: 'ÖZCAN', default: 'ÖZCAN' }
                ],
                buildUrl: (vals) => {
                    if (vals.id) return `/api/papara?id=${encodeURIComponent(vals.id)}`;
                    if (vals.name) return `/api/papara?name=${encodeURIComponent(vals.name)}`;
                    return null;
                }
            },
            {
                id: 'secmen',
                icon: '🗳️',
                title: 'Seçmen Sorgulama',
                badge: 'GET',
                badgeClass: 'red',
                endpoint: '/api/secmen',
                description: 'TC veya Ad-Soyad ile sorgulama',
                params: [
                    { name: 'tc', label: 'TC', placeholder: '18445070762', default: '18445070762' },
                    { name: 'ad', label: 'Ad', placeholder: 'AHMET', default: 'AHMET' },
                    { name: 'soyad', label: 'Soyad', placeholder: 'AYDOĞDU', default: 'AYDOĞDU' }
                ],
                buildUrl: (vals) => {
                    if (vals.tc) return `/api/secmen?action=tc&tc=${encodeURIComponent(vals.tc)}`;
                    if (vals.ad && vals.soyad) return `/api/secmen?action=adsoyad&ad=${encodeURIComponent(vals.ad)}&soyad=${encodeURIComponent(vals.soyad)}`;
                    return null;
                }
            },
            {
                id: 'turktelekom',
                icon: '📱',
                title: 'TurkTelekom Sorgulama',
                badge: 'GET',
                badgeClass: 'purple',
                endpoint: '/api/turktelekom',
                description: 'Ad, Ad-Soyad veya İl ile sorgulama',
                params: [
                    { 
                        name: 'sorgu', 
                        label: 'Sorgu Tipi', 
                        type: 'select',
                        options: [
                            { value: 'ad', label: 'Ad' },
                            { value: 'adsoyad', label: 'Ad Soyad' },
                            { value: 'il', label: 'İl' }
                        ],
                        default: 'ad'
                    },
                    { name: 'deger', label: 'Değer', placeholder: 'ali, ahmet hamza veya Ankara', default: 'ali' }
                ],
                buildUrl: (vals) => `/api/turktelekom?sorgu=${vals.sorgu}&deger=${encodeURIComponent(vals.deger)}`
            }
        ];

        // Toast mesajı
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.className = 'toast';
            }, 4000);
        }

        // API Sorgulama
        async function sorgula(apiId) {
            const api = APIS.find(a => a.id === apiId);
            if (!api) return;

            const resultDiv = document.getElementById(`${apiId}Result`);
            const loadingDiv = document.getElementById(`${apiId}Loading`);
            
            resultDiv.className = 'result';
            resultDiv.innerHTML = '';
            loadingDiv.className = 'loading show';

            // Parametreleri topla
            const vals = {};
            let valid = true;
            
            api.params.forEach(param => {
                const el = document.getElementById(`${apiId}_${param.name}`);
                if (el) {
                    const val = el.value ? el.value.trim() : '';
                    if (param.required && !val) {
                        valid = false;
                        showToast(`${param.label} gerekli!`, 'error');
                    }
                    vals[param.name] = val;
                }
            });

            if (!valid) {
                loadingDiv.className = 'loading';
                return;
            }

            const url = api.buildUrl(vals);
            if (!url) {
                showToast('Geçersiz parametreler!', 'error');
                loadingDiv.className = 'loading';
                return;
            }

            try {
                // URL'yi oluştur - site kökünden çağır
                const fullUrl = url.startsWith('http') ? url : url;
                
                const response = await fetch(fullUrl, {
                    method: 'GET',
                    headers: {
                        'Accept': '*/*',
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                    }
                });

                // Ham metni al
                const text = await response.text();
                
                // Sonucu göster
                resultDiv.className = 'result show';
                
                // JSON ise formatla, değilse ham göster
                try {
                    const json = JSON.parse(text);
                    resultDiv.innerHTML = `<span class="raw">✅ JSON Yanıt:</span>\n${JSON.stringify(json, null, 2)}`;
                } catch {
                    // JSON değilse ham metin olarak göster
                    resultDiv.innerHTML = `<span class="raw">📄 Ham Yanıt:</span>\n${text || '(Boş yanıt)'}`;
                }
                
                showToast(`✅ ${api.title} başarılı!`, 'success');

            } catch (error) {
                resultDiv.className = 'result show';
                resultDiv.innerHTML = `<div class="error">❌ Hata: ${error.message}</div>`;
                showToast(`❌ ${api.title} hatası: ${error.message}`, 'error');
            } finally {
                loadingDiv.className = 'loading';
            }
        }

        // API Kartlarını oluştur
        function renderCards() {
            const grid = document.getElementById('apiGrid');
            grid.innerHTML = '';
            
            APIS.forEach(api => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // Parametreleri oluştur
                let paramsHtml = '';
                api.params.forEach(param => {
                    if (param.type === 'select') {
                        let optionsHtml = param.options.map(opt => 
                            `<option value="${opt.value}" ${opt.value === param.default ? 'selected' : ''}>${opt.label}</option>`
                        ).join('');
                        paramsHtml += `
                            <div class="input-group">
                                <label>${param.label}</label>
                                <select id="${api.id}_${param.name}">
                                    ${optionsHtml}
                                </select>
                            </div>
                        `;
                    } else {
                        paramsHtml += `
                            <div class="input-group">
                                <label>${param.label}</label>
                                <input type="text" id="${api.id}_${param.name}" 
                                       placeholder="${param.placeholder || ''}" 
                                       value="${param.default || ''}">
                            </div>
                        `;
                    }
                });

                // Input row wrapper
                const isMultiParam = api.params.length > 1 && api.id !== 'secmen';
                const wrapperClass = isMultiParam ? 'input-row' : '';
                const wrappedParams = isMultiParam ? 
                    `<div class="${wrapperClass}">${paramsHtml}</div>` : 
                    paramsHtml;

                card.innerHTML = `
                    <div class="card-header">
                        <span class="card-title">
                            <span class="icon">${api.icon}</span>
                            ${api.title}
                        </span>
                        <span class="badge ${api.badgeClass}">${api.badge}</span>
                    </div>
                    <div class="endpoint">${api.endpoint}</div>
                    <div class="param-group">
                        ${api.params.map(p => `<span class="param">${p.name}: ${p.default || p.placeholder || ''}</span>`).join('')}
                    </div>
                    ${wrappedParams}
                    <button class="btn" onclick="sorgula('${api.id}')">🔍 Sorgula</button>
                    <div class="loading" id="${api.id}Loading">
                        <span class="spinner">⏳</span> Yükleniyor...
                    </div>
                    <div class="result" id="${api.id}Result"></div>
                `;
                
                grid.appendChild(card);
            });
        }

        // Enter tuşu desteği
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const target = e.target;
                if (target.tagName === 'INPUT' || target.tagName === 'SELECT') {
                    const card = target.closest('.card');
                    if (card) {
                        const btn = card.querySelector('.btn');
                        if (btn) btn.click();
                    }
                }
            }
        });

        // Sayfa yüklendiğinde
        document.addEventListener('DOMContentLoaded', function() {
            renderCards();
            console.log('🚀 Rinex API Gateway yüklendi!');
            console.log('📡 Toplam ' + APIS.length + ' API endpoint hazır.');
            console.log('💡 Her API kendi kaynağından veri çeker.');
            showToast('🚀 API Gateway hazır!', 'success');
        });
    </script>
</body>
</html>
